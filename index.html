    <!-- Migration HashRouter -> BrowserRouter -->
    <script>
      // Si l'URL contient un hash (ex: /#/article/123), on le transforme en chemin normal (/article/123)
      if (window.location.hash && window.location.hash.startsWith('#/')) {
        var newPath = window.location.hash.substring(1);
        window.history.replaceState(null, '', newPath);
      }
    </script>

    <title>WCI | L'actualité en continu</title>
